version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job-parser-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - backend-cache:/app/cache

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Point the frontend build to the backend container (or local port)
        - VITE_API_BASE_URL=http://localhost:5000
    container_name: job-parser-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-cache:
